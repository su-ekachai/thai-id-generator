name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, test, and verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Dependency audit
        run: bun audit

      - name: Type-check
        run: bun run typecheck

      - name: Test with the 90% coverage gate
        run: bun run test:coverage

      - name: Build
        run: bun run build

      - name: Verify no source maps in dist
        run: |
          if find dist -name '*.map' | grep -q .; then
            echo 'Production build leaked source maps; aborting.' >&2
            find dist -name '*.map'
            exit 1
          fi

      - name: Verify no inline script bodies in dist/index.html
        run: |
          if grep -E '<script[^>]*>[[:space:]]*[^<[:space:]]' dist/index.html; then
            echo 'dist/index.html contains an inline script body; CSP forbids this.' >&2
            exit 1
          fi

      - name: Set up Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
